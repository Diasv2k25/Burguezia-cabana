<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BURGUEZIA CABANA - SISTEMA VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root { --amarelo: #ffcc00; --preto: #0b0b0b; --card: #1a1a1a; --verde: #25D366; --vermelho: #ff4444; --azul: #3498db; }
        
        body { background: var(--preto); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        /* ESTILO DO TÍTULO DA LOJA */
        .loja-titulo { 
            font-family: 'Permanent Marker', cursive; 
            color: var(--amarelo); 
            margin: 0; 
            letter-spacing: 3px;
            font-size: 32px;
            text-shadow: 2px 2px #000;
        }

        .header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid var(--amarelo); }
        
        .tabs { display: flex; position: sticky; top: 0; background: #000; z-index: 100; padding: 10px; gap: 10px; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #222; color: #888; font-weight: bold; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .tab-btn.active { background: var(--amarelo); color: #000; }

        .container { padding: 15px; display: none; }
        .container.active { display: block; }

        /* Cardápio */
        .cat-label { color: var(--amarelo); font-size: 13px; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px; display: block; border-left: 3px solid var(--amarelo); padding-left: 10px; }
        .grid-cardapio { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .prod-btn { 
            background: var(--card); border: 1px solid #333; color: #fff; padding: 20px 10px; border-radius: 15px; 
            text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center;
            min-height: 100px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .prod-btn b { font-size: 16px; margin-bottom: 8px; display: block; }
        .prod-btn span { color: var(--verde); font-weight: bold; font-size: 14px; }
        .prod-btn.esgotado { border-color: var(--vermelho); opacity: 0.3; }
        
        /* Carrinho */
        .item-carrinho { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .qtd-controles { display: flex; align-items: center; gap: 15px; }
        .btn-qtd { background: var(--amarelo); border: none; color: #000; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .obs-item { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }

        /* Modais */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background:#1a1a1a; padding:20px; border-radius:20px; width:90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--amarelo); }
        .add-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }

        /* Form */
        .form-area { background: #111; padding: 20px; border-radius: 20px; margin-top: 30px; border: 1px solid #222; }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .total-box { font-size: 28px; text-align: center; color: var(--amarelo); padding: 20px; border: 2px dashed var(--amarelo); border-radius: 15px; margin: 20px 0; font-weight: bold; background: #000; }
        .btn-lancar { width: 100%; padding: 22px; background: var(--verde); border: none; border-radius: 15px; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; }

        .pedido-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid var(--amarelo); }
        .btn-c { border: none; padding: 10px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }

        @media print { 
            body * { visibility: hidden; } 
            #print-area, #print-area * { visibility: visible; } 
            @page { margin: 0; size: auto; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; 
                font-size: 30px; color: #000; line-height: 1.2; text-align: center; 
            } 
            .print-bold { font-weight: bold; font-size: 25px; }
            .print-divider { border-bottom: 2px dashed #000; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <div id="modal-adicionais" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--amarelo); margin:0;">Adicionais</h2>
            <p style="font-size: 12px; color: #ccc;">Escolha até 4 itens</p>
            <div id="lista-adicionais-opcoes"></div>
            <button onclick="confirmarAdicionais()" style="width:100%; padding:20px; background:var(--verde); border:none; border-radius:12px; font-weight:bold; margin-top:20px; font-size:16px;">CONFIRMAR 🛒</button>
            <button onclick="fecharModalAdicionais()" style="width:100%; padding:12px; background:#444; border:none; border-radius:12px; color:#fff; margin-top:10px;">VOLTAR</button>
        </div>
    </div>

    <div class="header">
        <h1 class="loja-titulo">BURGUEZIA CABANA</h1>
        <button onclick="alternarModoEstoque()" id="btn-estoque" style="background:#222; color:var(--amarelo); border:1px solid var(--amarelo); padding:8px 15px; border-radius:20px; margin-top:10px; font-size:11px;">ESTOQUE: LIVRE ✅</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('vendas', event)">VENDAS</button>
        <button class="tab-btn" onclick="openTab('cozinha', event)">COZINHA</button>
        <button class="tab-btn" onclick="openTab('caixa', event)">CAIXA</button>
    </div>

    <div id="vendas" class="container active">
        <span class="cat-label">Hambúrgueres e Combos</span>
        <div id="cardapio-burgers" class="grid-cardapio"></div>
        <span class="cat-label">Massas</span>
        <div id="cardapio-massas" class="grid-cardapio"></div>
        <span class="cat-label">Bebidas e Outros</span>
        <div id="cardapio-bebidas" class="grid-cardapio"></div>

        <div class="form-area">
            <h3 id="edit-msg" style="color: var(--azul); display: none; text-align: center;">📝 EDITANDO PEDIDO #<span id="edit-id"></span></h3>
            <div id="itens-selecionados"><p style="text-align:center; color:#666;">Carrinho vazio...</p></div>
            <div class="row">
                <input type="text" id="c-nome" placeholder="Nome do Cliente">
                <input type="number" id="c-whats" placeholder="WhatsApp (DDD)">
            </div>
            <div class="row">
                <select id="f-pagto" onchange="updateUI()"><option value="Dinheiro">Dinheiro</option><option value="Pix">Pix</option><option value="Cartão">Cartão (+R$1 Burger)</option></select>
                <select id="f-entrega" onchange="updateUI()"><option value="Local">Consumo Local</option><option value="Retirada">Retirada</option><option value="Entrega">Entrega</option></select>
            </div>
            <div id="area-pix" style="display:none;"><select id="s-pix"><option value="PENDENTE">PIX PENDENTE ❌</option><option value="PAGO">PIX PAGO ✅</option></select></div>
            <div id="area-endereco" style="display:none">
                <input type="number" id="e-cep" placeholder="CEP" onblur="buscarCEP(this.value)">
                <div class="row"><input type="text" id="e-rua" placeholder="Rua"><input type="text" id="e-num" placeholder="Nº"></div>
                <input type="text" id="e-bairro" placeholder="Bairro">
                <input type="number" id="e-taxa" placeholder="Taxa de Entrega R$" oninput="calcTotal()">
            </div>
            <div id="area-troco"><input type="number" id="v-recebido" placeholder="Troco para quanto?" oninput="calcTotal()"></div>
            <div class="total-box">TOTAL: R$ <span id="display-total">0,00</span></div>
            <div id="display-troco" style="text-align:center; color:var(--verde); font-weight:bold; margin-bottom:15px; font-size:18px;"></div>
            <button id="btn-final" class="btn-lancar" onclick="lancarPedido()">LANÇAR PEDIDO ✅</button>
            <button id="btn-cancel-edit" style="display:none; width:100%; margin-top:10px; background:#444; color:#fff; border:none; padding:15px; border-radius:12px;" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
        </div>
    </div>

    <div id="cozinha" class="container"><div id="lista-ativos"></div></div>
    <div id="caixa" class="container">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
            <div style="background:#222; padding:10px; border-radius:10px; text-align:center;">Dinheiro<br><b id="v-dinheiro" style="color:var(--verde)">0,00</b></div>
            <div style="background:#222; padding:10px; border-radius:10px; text-align:center;">Pix<br><b id="v-pix" style="color:var(--azul)">0,00</b></div>
            <div style="background:#222; padding:10px; border-radius:10px; text-align:center;">Cartão<br><b id="v-cartao" style="color:var(--amarelo)">0,00</b></div>
        </div>
        <div id="lista-finalizados"></div>
        <button onclick="finalizarDia()" style="width:100%; padding:20px; background:var(--vermelho); border:none; border-radius:15px; color:#fff; font-weight:bold; margin-top:30px;">FECHAR DIA / LIMPAR TUDO</button>
    </div>

    <div id="modal-moto" class="modal"><div class="modal-content"><h3 style="color:var(--amarelo);">Motoboy</h3><div id="motos-btns"></div></div></div>
    <div id="print-area"></div>

    <script>
        const produtos = [
            { id: 1, cat: "burger", nome: "Combo X-Tudo + Coca", preco: 14.99, isBurger: true },
            { id: 2, cat: "burger", nome: "3 X-Tudo + Mate 1L", preco: 39.99, isBurger: true },
            { id: 3, cat: "burger", nome: "Burguezia", preco: 15.99, isBurger: true },
            { id: 4, cat: "burger", nome: "X-Tudo", preco: 10.99, isBurger: true },
            { id: 14, cat: "massas", nome: "Macarrão na Chapa", preco: 10.99, isBurger: false },
            { id: 5, cat: "bebida", nome: "Coca-Cola 2L", preco: 13.00, isBurger: false },
            { id: 6, cat: "bebida", nome: "Mate Couro 1L", preco: 8.00, isBurger: false },
            { id: 7, cat: "bebida", nome: "Coca 310ml", preco: 5.00, isBurger: false },
            { id: 13, cat: "bebida", nome: "Refrigerante Fanta", preco: 11.00, isBurger: false },
            { id: 15, cat: "bebida", nome: "Suco Del Valle", preco: 5.00, isBurger: false }
        ];

        const adicionaisOpcoes = [
            { nome: "Ovo", preco: 1.50, max: 1 },
            { nome: "Presunto", preco: 1.50, max: 1 },
            { nome: "Mussarela", preco: 2.00, max: 1 },
            { nome: "Molho Especial", preco: 2.00, max: 4 },
            { nome: "Carne", preco: 3.00, max: 1 },
            { nome: "Bacon", preco: 3.00, max: 1 }
        ];

        let ativos = JSON.parse(localStorage.getItem('b_ativos')) || [];
        let finalizados = JSON.parse(localStorage.getItem('b_finalizados')) || [];
        let cancelados = JSON.parse(localStorage.getItem('b_cancelados')) || [];
        let cont = parseInt(localStorage.getItem('b_cont')) || 1;
        let estoqueEsgotado = JSON.parse(localStorage.getItem('b_estoque')) || {};
        let carrinho = [], selecionadosNoModal = {}, itemSendoAdicionado = null;
        let modoAjusteEstoque = false, pedidoEmEdicao = null;
        const motoboys = ["Anderson", "Douglas", "Gustavo", "Mateus", "Rodrigo"];

        function salvarDados() {
            localStorage.setItem('b_ativos', JSON.stringify(ativos));
            localStorage.setItem('b_finalizados', JSON.stringify(finalizados));
            localStorage.setItem('b_cancelados', JSON.stringify(cancelados));
            localStorage.setItem('b_cont', cont);
            localStorage.setItem('b_estoque', JSON.stringify(estoqueEsgotado));
        }

        function renderCardapio() {
            const b = document.getElementById('cardapio-burgers'); 
            const d = document.getElementById('cardapio-bebidas');
            const m = document.getElementById('cardapio-massas');
            b.innerHTML = ""; d.innerHTML = ""; m.innerHTML = "";
            produtos.forEach(p => {
                const esg = estoqueEsgotado[p.id] ? "esgotado" : "";
                const html = `<button class="prod-btn ${esg}" onclick="tratarCliqueProduto(${p.id})"><b>${p.nome}</b><span>R$ ${p.preco.toFixed(2)}</span></button>`;
                if(p.cat === "burger") b.innerHTML += html;
                else if(p.cat === "massas") m.innerHTML += html;
                else d.innerHTML += html;
            });
        }

        function tratarCliqueProduto(id) {
            if(modoAjusteEstoque) { estoqueEsgotado[id] = !estoqueEsgotado[id]; salvarDados(); renderCardapio(); return; }
            if(estoqueEsgotado[id]) return;
            const p = produtos.find(x => x.id === id);
            if(p.cat === "burger" || p.cat === "massas") abrirModalAdicionais(p);
            else addAoCarrinho(p, []);
        }

        function abrirModalAdicionais(p) {
            itemSendoAdicionado = p; selecionadosNoModal = {};
            document.getElementById('modal-adicionais').style.display = 'flex';
            renderOpcoesAdicionais();
        }

        function renderOpcoesAdicionais() {
            const area = document.getElementById('lista-adicionais-opcoes'); area.innerHTML = "";
            adicionaisOpcoes.forEach(add => {
                let qtd = selecionadosNoModal[add.nome] || 0;
                area.innerHTML += `<div class="add-row"><div><b>${add.nome}</b><br><small>R$ ${add.preco.toFixed(2)}</small></div>
                <div class="qtd-controles"><button class="btn-qtd" onclick="alterarQtdModal('${add.nome}', -1)">-</button>
                <span style="width:20px; text-align:center">${qtd}</span><button class="btn-qtd" onclick="alterarQtdModal('${add.nome}', 1)">+</button></div></div>`;
            });
        }

        function alterarQtdModal(nome, val) {
            let total = Object.values(selecionadosNoModal).reduce((a, b) => a + b, 0);
            let item = adicionaisOpcoes.find(x => x.nome === nome);
            let atual = selecionadosNoModal[nome] || 0;
            if(val > 0) {
                if(total >= 4 || atual >= item.max) return;
                selecionadosNoModal[nome] = atual + 1;
            } else if(atual > 0) selecionadosNoModal[nome] = atual - 1;
            renderOpcoesAdicionais();
        }

        function confirmarAdicionais() {
            let extras = [];
            for(let n in selecionadosNoModal) if(selecionadosNoModal[n]>0) {
                let info = adicionaisOpcoes.find(x=>x.nome===n);
                extras.push({nome:n, preco:info.preco, qtd:selecionadosNoModal[n]});
            }
            addAoCarrinho(itemSendoAdicionado, extras);
            fecharModalAdicionais();
        }

        function fecharModalAdicionais() { document.getElementById('modal-adicionais').style.display = 'none'; }

        function addAoCarrinho(p, extras) {
            carrinho.push({...p, qtd:1, obs:"", extras: extras});
            renderCarrinho();
        }

        function renderCarrinho() {
            const div = document.getElementById('itens-selecionados');
            if(!carrinho.length) { div.innerHTML = "<p style='text-align:center; color:#666;'>Carrinho vazio...</p>"; calcTotal(); return; }
            div.innerHTML = carrinho.map((item, i) => `
                <div class="item-carrinho">
                    <div class="item-header"><b>${item.nome}</b>
                    <div class="qtd-controles"><button class="btn-qtd" onclick="alterarQtd(${i},-1)">-</button>
                    <b>${item.qtd}</b><button class="btn-qtd" onclick="alterarQtd(${i},1)">+</button></div></div>
                    ${item.extras.length ? `<span class="extras-lista" style="font-size:11px; color:var(--amarelo)">Extras: ${item.extras.map(e=>`${e.qtd}x ${e.nome}`).join(', ')}</span>` : ''}
                    <input type="text" class="obs-item" placeholder="Observação..." value="${item.obs}" onchange="carrinho[${i}].obs=this.value">
                </div>`).join('');
            calcTotal();
        }

        function alterarQtd(i, v) { carrinho[i].qtd += v; if(carrinho[i].qtd <= 0) carrinho.splice(i, 1); renderCarrinho(); }

        function calcTotal() {
            let t = 0; const pgt = document.getElementById('f-pagto').value;
            const taxa = parseFloat(document.getElementById('e-taxa').value) || 0;
            carrinho.forEach(i => {
                let precoUnit = i.preco + (pgt==='Cartão' && i.isBurger ? 1 : 0);
                i.extras.forEach(e => precoUnit += (e.preco * e.qtd));
                t += (precoUnit * i.qtd);
            });
            t += taxa;
            document.getElementById('display-total').innerText = t.toFixed(2);
            const rec = parseFloat(document.getElementById('v-recebido').value) || 0;
            document.getElementById('display-troco').innerText = (rec > t && pgt==='Dinheiro') ? `TROCO: R$ ${(rec-t).toFixed(2)}` : "";
            return t;
        }

        function lancarPedido() {
            if(!carrinho.length) return alert("Carrinho vazio!");
            const total = calcTotal();
            const ped = {
                id: pedidoEmEdicao ? pedidoEmEdicao.id : cont++,
                nome: document.getElementById('c-nome').value || "Cliente",
                whats: document.getElementById('c-whats').value,
                itens: JSON.parse(JSON.stringify(carrinho)),
                total: total,
                recebido: parseFloat(document.getElementById('v-recebido').value) || 0,
                pagto: document.getElementById('f-pagto').value,
                entrega: document.getElementById('f-entrega').value,
                hora: new Date().toLocaleTimeString().substr(0,5)
            };
            if(pedidoEmEdicao) { ativos[ativos.findIndex(x=>x.id===ped.id)] = ped; cancelarEdicao(); }
            else ativos.push(ped);
            imprimir(ped); limparForm(); salvarDados();
        }

        function imprimir(p) {
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="text-align:center;">
                    <h2 style="margin:0; font-size:24px;">BURGUEZIA</h2>
                    <b class="print-bold">PEDIDO #${p.id}</b><br>
                    <span>${p.hora}</span>
                </div>
                <div class="print-divider"></div>
                <div style="font-size: 25px; text-align: center;">
                    <b>CLIENTE:</b> ${p.nome}<br><b>TIPO:</b> ${p.entrega}
                </div>
                <div class="print-divider"></div>
                <div style="text-align: center;">
                    ${p.itens.map(i => `<div style="margin-bottom: 8px;"><b class="print-bold">${i.qtd}x ${i.nome}</b>${i.obs ? `<br><i>(Obs: ${i.obs})</i>` : ''}</div>`).join('')}
                </div>
                <div class="print-divider"></div>
                <div style="font-size: 25px; text-align: center;"><b>TOTAL: R$ ${p.total.toFixed(2)}</b><br><span style="font-size: 20px;">Pagto: ${p.pagto}</span></div>`;
            window.print();
        }

        function renderCozinha() {
            const div = document.getElementById('lista-ativos'); div.innerHTML = "";
            ativos.forEach(p => {
                div.innerHTML += `<div class="pedido-card"><b>#${p.id} - ${p.nome}</b><br>
                <small>${p.itens.map(i=>`${i.qtd}x ${i.nome}`).join(', ')}</small>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn-c" style="background:var(--azul)" onclick="editar(${p.id})">EDITAR</button>
                    <button class="btn-c" style="background:var(--vermelho)" onclick="cancelarPedido(${p.id})">CANCELAR</button>
                    <button class="btn-c" style="background:var(--verde); flex:1; color:#000" onclick="abrirMoto(${p.id})">CONCLUIR 🚀</button>
                </div></div>`;
            });
        }

        function cancelarPedido(id) {
            if(confirm(`Deseja realmente cancelar o pedido #${id}?`)) {
                const idx = ativos.findIndex(x => x.id === id);
                if(idx > -1) {
                    const ped = ativos.splice(idx, 1)[0];
                    ped.status = "Cancelado";
                    cancelados.push(ped);
                    salvarDados();
                    renderCozinha();
                }
            }
        }

        function renderCaixa() {
            let d=0, p=0, c=0;
            finalizados.forEach(ped => { if(ped.pagto==='Dinheiro') d+=ped.total; else if(ped.pagto==='Pix') p+=ped.total; else c+=ped.total; });
            document.getElementById('v-dinheiro').innerText = d.toFixed(2);
            document.getElementById('v-pix').innerText = p.toFixed(2);
            document.getElementById('v-cartao').innerText = c.toFixed(2);
            const div = document.getElementById('lista-finalizados'); 
            div.innerHTML = finalizados.map(f => `<div class="pedido-card" style="font-size:12px">#${f.id} - R$ ${f.total.toFixed(2)} (${f.pagto}) - Moto: ${f.moto}</div>`).join('');
        }

        function editar(id) {
            const p = ativos.find(x => x.id === id); pedidoEmEdicao = p;
            carrinho = JSON.parse(JSON.stringify(p.itens));
            document.getElementById('c-nome').value = p.nome;
            document.getElementById('edit-msg').style.display = 'block';
            document.getElementById('edit-id').innerText = p.id;
            document.getElementById('btn-final').innerText = "SALVAR ALTERAÇÕES ✅";
            document.getElementById('btn-cancel-edit').style.display = 'block';
            openTab('vendas', {target: document.querySelectorAll('.tab-btn')[0]});
            renderCarrinho();
        }

        function abrirMoto(id) {
            const p = ativos.find(x=>x.id===id);
            if(p.entrega!=='Entrega') return concluir(id, 'Balcão');
            document.getElementById('modal-moto').style.display='flex';
            document.getElementById('motos-btns').innerHTML = motoboys.map(m=>`<button onclick="concluir(${id},'${m}')" style="width:100%; padding:15px; margin-bottom:10px; background:#333; color:#fff; border:1px solid var(--amarelo); border-radius:10px;">${m}</button>`).join('');
        }

        function concluir(id, moto) {
            const idx = ativos.findIndex(x=>x.id===id);
            const p = ativos.splice(idx,1)[0]; p.moto = moto; finalizados.unshift(p);
            document.getElementById('modal-moto').style.display='none';
            salvarDados(); renderCozinha();
        }

        function openTab(id, e) {
            document.querySelectorAll('.container').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); e.target.classList.add('active');
            if(id==='cozinha') renderCozinha(); if(id==='caixa') renderCaixa();
        }

        function updateUI() {
            const ent = document.getElementById('f-entrega').value;
            document.getElementById('area-endereco').style.display = ent==='Entrega'?'block':'none';
            document.getElementById('area-pix').style.display = document.getElementById('f-pagto').value==='Pix'?'block':'none';
            calcTotal();
        }

        function limparForm() { carrinho=[]; document.querySelectorAll('input').forEach(i=>i.value=""); renderCarrinho(); }
        function cancelarEdicao() { pedidoEmEdicao=null; document.getElementById('edit-msg').style.display='none'; document.getElementById('btn-cancel-edit').style.display='none'; document.getElementById('btn-final').innerText="LANÇAR PEDIDO ✅"; limparForm(); }
        function finalizarDia() { if(confirm("Zerar tudo?")) { localStorage.clear(); location.reload(); } }
        function alternarModoEstoque() { modoAjusteEstoque=!modoAjusteEstoque; document.getElementById('btn-estoque').innerText=modoAjusteEstoque?"MODO: ESGOTAR ⚠️":"ESTOQUE: LIVRE ✅"; renderCardapio(); }
        function buscarCEP(c) { if(c.length===8) fetch(`https://viacep.com.br/ws/${c}/json/`).then(r=>r.json()).then(d=>{if(!d.erro){document.getElementById('e-rua').value=d.logradouro;document.getElementById('e-bairro').value=d.bairro;}}); }

        renderCardapio();
    </script>
</body>
</html>
